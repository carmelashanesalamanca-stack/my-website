<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarShan Engineering and IT Services - Home</title>
  <style>
    body { margin:0; font-family:Arial, sans-serif; }

    /* Navigation */
    nav { background:#333; color:#552d2d; padding:15px; text-align:center; position:sticky; top:0; z-index:100; }
    nav a { color:#794848; margin:0 15px; text-decoration:none; font-weight:bold; }
    nav a:hover { color:#ffcc00; }

    /* Hero Section with Background Image */
    .hero {
      position: relative;
      background: url('https://i.pinimg.com/736x/56/d4/e4/56d4e48f5d200e15812be9022d4a9fcd.jpg') no-repeat center center/cover;
      color: #e2cdcd;
      text-align: center;
      padding: 120px 20px;
      min-height: 100vh;
    }

    /* Optional overlay */
    .hero::before {
      content:"";
      position: absolute;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.5); /* dark overlay */
      z-index:0;
    }

    .hero-content {
      position: relative;
      z-index:1;
      max-width:800px;
      margin:0 auto;
    }

    h1 { font-size:3em; margin-bottom:20px; }
    p { font-size:1.2em; margin-bottom:30px; }

    .cta-button {
      display:inline-block;
      margin:10px;
      padding:15px 30px;
      color:#fff;
      text-decoration:none;
      border-radius:5px;
      font-size:1em;
      transition: background 0.3s;
    }
    .cta-button:hover { opacity:0.85; }
    .cta-button.services { background:#3b526b; }
    .cta-button.contact { background:#345741; }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="contact.html">Contact</a>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1>MarShan Engineering and IT Services</h1>
      <p>Your trusted partner for IT and Civil Engineering solutions.</p>
      <a href="services.html" class="cta-button services">View Our Services</a>
      <a href="contact.html" class="cta-button contact">Contact Us</a>
    </div>
  </section>

</body>
</html>
