<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarShan Engineering and IT Services - Contact</title>
  <style>
    body { margin:0; font-family:Arial, sans-serif; }

    /* Navigation */
    nav { background:#271c1c; color:#181717; padding:15px; text-align:center; position:sticky; top:0; z-index:100; }
    nav a { color:#bb8d8d; margin:0 15px; text-decoration:none; font-weight:bold; }
    nav a:hover { color:#ffcc00; }

    /* Contact Section with Background Image */
    .contact-section {
      position: relative;
      background: url('https://media.istockphoto.com/id/1075246634/photo/digital-tablet-with-modern-buildings-hologram-and-technology-icons-smart-city-internet-and.jpg?s=170667a&w=0&k=20&c=FI9FOKBje4hgwYlk8MlTbJG2DWJNiTHmvJTkwC9-JYk=') no-repeat center center/cover;
      color: #ece1e1;
      text-align: center;
      padding: 120px 20px;
      min-height: 100vh;
    }

    /* Overlay for readability */
    .contact-section::before {
      content:"";
      position: absolute;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.5);
      z-index:0;
    }

    .contact-content {
      position: relative;
      z-index:1;
      max-width:600px;
      margin:0 auto;
    }

    h2 { font-size:2.5em; margin-bottom:30px; }
    p { font-size:1.1em; margin:10px 0; }

    /* Buttons */
    .contact-button {
      display:inline-block;
      margin:10px;
      padding:15px 30px;
      color:#fff;
      text-decoration:none;
      border-radius:5px;
      font-size:1em;
      transition: opacity 0.3s;
    }
    .contact-button.email { background:#6c98c7; }   /* blue for email */
    .contact-button.whatsapp { background:#285237; } /* green for WhatsApp */
    .contact-button:hover { opacity:0.85; }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="contact.html">Contact</a>
  </nav>

  <!-- Contact Section with Background Image -->
  <section class="contact-section">
    <div class="contact-content">
      <h2>Contact Us</h2>
      <p>Email us or chat with us on WhatsApp!</p>

      <!-- Email button -->
      <a href="mailto:info@marshanservices.com" class="contact-button email">Email: info@marshanservices.com</a>

      <a href="https://wa.me/971543234027?text=Hello%20MarShan%20Services!" target="_blank" class="contact-button whatsapp">
  WhatsApp: 0543XXXXX
</a>

      <p>Fill out our contact form or request a quote!</p>
    </div>
  </section>
